name: build-windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach the Windows zip to, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows app
        shell: pwsh
        run: .\scripts\build_windows_app.ps1
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Data-Anonymizer-Windows
          path: dist/AI-Data-Anonymizer-Windows.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: dist/AI-Data-Anonymizer-Windows.zip
